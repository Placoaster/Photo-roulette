<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Roulette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .roulette-bg { background: radial-gradient(circle, #2d1b4e 0%, #0f0a1e 100%); }
    </style>
</head>
<body class="roulette-bg text-white h-screen flex flex-col items-center justify-center p-4">

    <!-- Pantalla de Login -->
    <div id="pantalla-login" class="w-full max-w-sm text-center">
        <h1 class="text-5xl font-black mb-10 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-400">PHOTO ROULETTE</h1>
        <div class="space-y-4">
            <input id="input-nombre" type="text" placeholder="Tu nombre" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none focus:ring-2 focus:ring-pink-500 transition">
            <input id="input-pin" type="text" placeholder="PIN de sala (Ej: 1234)" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none focus:ring-2 focus:ring-pink-500 transition">
            <button onclick="unirse()" class="w-full py-4 bg-pink-600 rounded-2xl font-bold text-xl shadow-lg hover:bg-pink-500 transition transform active:scale-95">¡ENTRAR!</button>
        </div>
    </div>

    <!-- Pantalla de Juego -->
    <div id="pantalla-juego" class="hidden w-full max-w-md text-center">
        <div id="espera" class="mb-6 italic text-gray-400">Esperando a que alguien inicie la ronda...</div>
        <img id="foto-pantalla" class="w-full aspect-square object-cover rounded-3xl shadow-2xl border-4 border-white/10 blur-3xl transition-all duration-[4000ms]">
        <button id="btn-iniciar" onclick="iniciarRonda()" class="mt-8 px-8 py-3 bg-white/10 border border-white/20 rounded-full font-bold">Siguiente Ronda</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
